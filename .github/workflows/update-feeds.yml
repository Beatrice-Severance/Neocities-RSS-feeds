name: Update RSS feeds

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours — adjust as you like
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Fetch feeds
        run: npm run build

      - name: Commit updated feeds-data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds-data.json
          git diff --staged --quiet || git commit -m "Auto-update feeds [skip ci]"
          git push

      # --- Deploy the site to Neocities ---
      # Requires a repo secret named NEOCITIES_API_KEY (see README for how to get it).
      - name: Deploy to Neocities
        run: |
          curl -f https://neocities.org/api/upload \
            -H "Authorization: Bearer ${{ secrets.NEOCITIES_API_KEY }}" \
            -F "index.html=@index.html" \
            -F "app.js=@app.js" \
            -F "style.css=@style.css" \
            -F "feeds-data.json=@feeds-data.json"
